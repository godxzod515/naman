<html>
<head>
    <title>this is my first website</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;

        }
        h1 {
             color:#333;

        }
        h2 {

        li {

            color:rgb(0, 0, 9)
         }
        img {
            border-radius: 10px;

        button {
            padding:20px 10px;
            background-color: rgb(17, 17, 17);

            border: none;

            cursor:pointer;
            font-family: cursive;
        }
        a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }    
        a:hover { color: blue; }

            display: none;

            text-align: center;
        }
        .active {
            display:block;        
        }
        .card {
            background-color: white;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            margin: 40px auto;
            border-radius: 14px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .box {
      background: white;
      width: 300px;
      margin:250px;
      padding: 20px;
      border-radius: 40px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input {
      width: 90%;

      margin: 10px 0;
      font-family: monospace;
    }
    #dashboard {
        display: none;
    }

        background-color: black;
        padding: 15px;
        }
    .navbar button {
        background: none ;
        margin: 15px ;
        color: white ;
        border: none ;
        font-size: 16px ;
        cursor: pointer ;
    }    
    .navbar button:hover {
        color: yellow ;
       }
    </style>
</head>

<body>
    <div class="navbar">
        <button onclick="showhome()">show home</button>
        <button onclick="showPortfolio()">show portfolio</button>
    </div>
    <div class="card">
<div id="home" class="page active">
    <h1>Naman Nayan</h1>
    <ul>
    <li>web development beginner</li>
    <li>I study in class 11th.</li>
    <li>I love to listen music while doing works and ChatGPT helps me.</li>
</ul>
    <img src="logo.png" width="200">

    <h2>My Skills</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>Basic Coding</li>
    </ul>

    <h2>Contact Me</h2>
    <button onclick="contactme()">Contact Me</button>

    <h2>Follow Me</h2>
    <a href="https://www.instagram.com/namannayan_54?igsh=eHBhNmh1MG9qYmE4" target="_blank">Instagram</a>
     <p></p>
    <button onclick="showPortfolio()">go to next page</button>
    </div>

    <div id="portfolio"class="page">
    <button onclick="changeText()">click me</button>
    <p>counter:<span id="count">0</span></p>
    <button onclick="togglemode()">toggle dark mode</button>
    <h2>calculator</h2>
    <input type="number" id="num1" placeholder="enter first number">
    <br><br>
    <input type="number" id="num2" placeholder="enter second number">
    <br><br>
    <button onclick="add()">add</button>
    <button onclick="subtract()">subtract</button>
    <p id="result"></p>
    <h2>to do list</h2>
    <input type="text" id="taskInput" placeholder="enter your task">
    <br><br>
    <button onclick="addTask()">add task</button>
    <ul id="taskList"></ul>
    <button onclick="goHome()">go home</button>
</div>
<script>
alert("Welcome to my website");

let counter = 0;

function changeText() {;
    counter++;
    document.getElementById("count").innerText = counter;
}
let isdark = false;
  function togglemode() {
    if (isdark === false) {
        document.body.style.backgroundColor = "#121212";
        document.body.style.color = "red";
        isdark = true
    } else {
        document.body.style.backgroundColor = "lightblue";
        document.body.style.color = "black"
        isdark = false
    }
  }
  function contactme() {
    alert("namannayan515@gmail.com");
  }
  function add(){
    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;
     
     let result = Number(a) + Number(b)
      document.getElementById("result").innerText = "Result: " + result;
  }
  function subtract() {
    let a = document.getElementById("num1").value;
    let b = document.getElementById("num2").value;
     let result = Number(a)- Number(b)
     document.getElementById("result").innerText = "Result: " + result;
  }
  function addTask () {
    let task = document.getElementById("taskInput").value;
     
    if (task === "") {
        alert("please enter a task!");
        return;
    }
    let li = document.createElement("li");
    li.innerText = task ;
    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "delete";
    deleteBtn.style.marginLeft = "10px";

    deleteBtn.onclick = function(){
        li.remove();
    };
    li.appendChild(deleteBtn);
    document.getElementById("taskList").appendChild(li);
    document.getElementById("taskInput").value = "";

  }
  function showPortfolio(){
    document.getElementById("home").classList.remove("active");
    document.getElementById("portfolio").classList.add("active")
  }
  function goHome(){
    document.getElementById("portfolio").classList.remove("active")
    document.getElementById("home").classList.add("active")
  } 
  function showhome() {
    document.getElementById("show home").classList.remove("active")
    document.getElementById("show portfolio").classList.add("active")
  }
</script>
</body>
</html>
